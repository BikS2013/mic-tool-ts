<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'"
    >
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>mic-tool-ts</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell" data-demo="false">
      <header class="toolbar">
        <div class="traffic-space" aria-hidden="true"></div>
        <div class="session-heading">
          <h1>Live Transcription</h1>
          <p id="sessionSummary">Loading settings...</p>
        </div>
        <div class="toolbar-actions">
          <div class="toolbar-group" aria-label="View controls">
            <button class="icon-button" type="button" data-view-button="monitor" aria-label="Show monitor">M</button>
            <button class="icon-button" type="button" data-view-button="settings" aria-label="Show settings">S</button>
            <button class="icon-button" type="button" data-view-button="protocol" aria-label="Show protocol">P</button>
          </div>
          <div class="status-chip" id="sessionStatus">
            <span class="status-light" aria-hidden="true"></span>
            <span id="sessionStatusText">Idle</span>
          </div>
        </div>
      </header>

      <nav class="sidebar" aria-label="Primary">
        <div class="brand">mic-tool-ts</div>
        <div class="nav-list">
          <button class="nav-item active" type="button" data-view-button="monitor">
            <span class="nav-icon" aria-hidden="true">1</span>
            <span>Monitor</span>
            <span class="badge" id="transcriptCount">0</span>
          </button>
          <button class="nav-item" type="button" data-view-button="settings">
            <span class="nav-icon" aria-hidden="true">2</span>
            <span>Settings</span>
          </button>
          <button class="nav-item" type="button" data-view-button="protocol">
            <span class="nav-icon" aria-hidden="true">3</span>
            <span>Protocol</span>
          </button>
          <button class="nav-item" type="button" data-view-button="logs">
            <span class="nav-icon" aria-hidden="true">4</span>
            <span>Logs</span>
            <span class="badge" id="eventCount">0</span>
          </button>
        </div>

        <div class="source-list" aria-label="Session source summary">
          <div class="source-row">
            <span>Provider</span>
            <strong id="providerValue">--</strong>
          </div>
          <div class="source-row">
            <span>Mode</span>
            <strong id="modeValue">--</strong>
          </div>
          <div class="source-row">
            <span>Input</span>
            <strong id="inputValue">Ready</strong>
          </div>
        </div>
      </nav>

      <main class="content">
        <div class="content-topline">
          <div class="segmented" role="tablist" aria-label="Monitor views">
            <button class="selected" type="button" data-view-button="monitor">Transcript</button>
            <button type="button" data-view-button="logs">Events</button>
          </div>
          <span class="demo-pill" id="demoPill"></span>
        </div>

        <section class="view-panel active" id="monitorView" aria-label="Transcript timeline">
          <div class="timeline" id="timeline" aria-live="polite"></div>
        </section>

        <section class="view-panel" id="settingsView" aria-label="Settings overview">
          <form class="settings-form" id="settingsForm">
            <label class="field-row">
              <span>Provider</span>
              <select id="providerControl" data-setting-control>
                <option value="soniox">Soniox</option>
                <option value="elevenlabs">ElevenLabs</option>
              </select>
            </label>
            <label class="field-row">
              <span>Model</span>
              <input id="modelControl" data-setting-control type="text" autocomplete="off" spellcheck="false">
            </label>
            <label class="field-row">
              <span>Languages</span>
              <input id="languagesControl" data-setting-control type="text" autocomplete="off" spellcheck="false">
            </label>
            <label class="field-row">
              <span>Sample rate</span>
              <select id="sampleRateControl" data-setting-control>
                <option value="8000">8000 Hz</option>
                <option value="16000">16000 Hz</option>
                <option value="22050">22050 Hz</option>
                <option value="24000">24000 Hz</option>
                <option value="44100">44100 Hz</option>
                <option value="48000">48000 Hz</option>
              </select>
            </label>
            <label class="check-row">
              <span>Endpoint detection</span>
              <input id="endpointControl" data-setting-control type="checkbox">
            </label>
            <label class="check-row">
              <span>Push-to-talk</span>
              <input id="hotkeyEnabledControl" data-setting-control type="checkbox">
            </label>
            <label class="field-row">
              <span>Hotkey</span>
              <input id="hotkeyControl" data-setting-control type="text" autocomplete="off" spellcheck="false">
            </label>
          </form>
        </section>

        <section class="view-panel" id="protocolView" aria-label="Protocol overview">
          <form class="settings-form" id="protocolForm">
            <label class="field-row">
              <span>Mode</span>
              <select id="protocolModeControl" data-setting-control>
                <option value="dictation">dictation</option>
                <option value="agent-protocol">agent-protocol</option>
                <option value="hybrid">hybrid</option>
              </select>
            </label>
            <label class="check-row">
              <span>Refine sections</span>
              <input id="refineControl" data-setting-control type="checkbox">
            </label>
            <label class="check-row">
              <span>Translate sections</span>
              <input id="translateControl" data-setting-control type="checkbox">
            </label>
            <label class="check-row">
              <span>Clipboard</span>
              <input id="clipboardControl" data-setting-control type="checkbox">
            </label>
            <label class="check-row">
              <span>Focused input</span>
              <input id="focusedInputControl" data-setting-control type="checkbox">
            </label>
            <label class="field-row">
              <span>Translation policy</span>
              <select id="translationPolicyControl" data-setting-control>
                <option value="opposite">opposite</option>
                <option value="to-en">to-en</option>
                <option value="to-el">to-el</option>
              </select>
            </label>
            <label class="check-row">
              <span>LLM engine</span>
              <input id="llmEnabledControl" data-setting-control type="checkbox">
            </label>
            <label class="field-row">
              <span>LLM provider</span>
              <select id="llmProviderControl" data-setting-control>
                <option value="azure-openai">azure-openai</option>
                <option value="openai">openai</option>
                <option value="anthropic">anthropic</option>
                <option value="google">google</option>
                <option value="azure-ai-inference">azure-ai-inference</option>
                <option value="ollama">ollama</option>
                <option value="litellm">litellm</option>
                <option value="openai-compat">openai-compat</option>
              </select>
            </label>
            <label class="field-row">
              <span>LLM model</span>
              <input id="llmModelControl" data-setting-control type="text" autocomplete="off" spellcheck="false">
            </label>
          </form>
        </section>

        <section class="view-panel" id="logsView" aria-label="Session event log">
          <div class="event-list" id="eventList"></div>
        </section>
      </main>

      <aside class="inspector" aria-label="Inspector">
        <section class="setting-group">
          <h2>Credentials</h2>
          <div class="setting-row"><span id="apiKeyName">API key</span><strong class="value" id="apiKeyStatus">unknown</strong></div>
          <div class="setting-row"><span>Expiry</span><strong class="warning" id="expiryStatus">unknown</strong></div>
          <div class="setting-row"><span>Storage</span><strong class="value" id="storageStatus">user .env</strong></div>
        </section>

        <section class="setting-group">
          <h2>Recent Events</h2>
          <div class="event-list compact" id="recentEvents"></div>
        </section>
      </aside>

      <footer class="capture-bar">
        <div class="meter" aria-hidden="true">
          <span class="meter-bar"></span>
          <span class="meter-bar"></span>
          <span class="meter-bar"></span>
          <span class="meter-bar"></span>
          <span class="meter-bar"></span>
        </div>
        <div class="capture-copy">
          <div class="capture-label">Live partial</div>
          <div class="live-text" id="liveText">Waiting for audio...</div>
        </div>
        <div class="capture-actions">
          <button class="icon-button" type="button" data-view-button="logs" aria-label="Show logs">L</button>
          <button class="start-button" type="button" id="sessionToggle">Start Listening</button>
        </div>
      </footer>
    </div>
  </body>
</html>
